<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DELTA Offense — CFB26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--bg2:#111318;--bg3:#1a1d24;--bg4:#22262f;--border:#2a2f3a;--accent:#e8c547;--accent2:#4a9eff;--red:#e85547;--text:#e8eaf0;--text2:#8a90a0;--text3:#555c6e;--run:#e8c547;--pass:#4a9eff;--rpo:#c084fc;--pa:#52d48a;--keep:#52d48a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;z-index:50}
.header-inner{display:flex;align-items:center;height:52px;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--accent);white-space:nowrap;flex-shrink:0}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;display:none}
.top-tabs{display:none}
.content{flex:1;overflow:hidden;position:relative}
.tab-panel{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-panel.active{display:block}
.bottom-nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--text3);font-size:10px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.sit-layout{height:100%;display:flex;flex-direction:column}
.scroll-bar{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;scrollbar-width:none}
.scroll-bar::-webkit-scrollbar{display:none}
.scroll-inner{display:flex;gap:6px;padding:8px 12px;white-space:nowrap}
.group-tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;font-family:'Inter',sans-serif;white-space:nowrap}
.group-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif}
.chip.active{color:#000;border-color:transparent}
.sit-plays{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sit-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent)}
.sit-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-top:3px;margin-bottom:12px}
.plays-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.play-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;position:relative;min-height:80px}
.play-card:active{transform:scale(.97);background:var(--bg4)}
.play-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:4px}
.play-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;padding-right:36px}
.play-formation{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;line-height:1.3}
.type-badge{font-size:8px;font-weight:700;letter-spacing:1px;padding:3px 6px;border-radius:3px;font-family:'DM Mono',monospace}
.tbadge-abs{position:absolute;top:10px;right:10px}
.badge-RUN{background:rgba(232,197,71,.15);color:var(--run)}
.badge-PASS{background:rgba(74,158,255,.15);color:var(--pass)}
.badge-RPO{background:rgba(192,132,252,.15);color:var(--rpo)}
.badge-PA{background:rgba(82,212,138,.15);color:var(--pa)}
.form-layout{height:100%;display:flex;flex-direction:column}
.form-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.form-set-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:3px}
.form-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent2);margin-bottom:6px}
.form-identity{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.presnap-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px}
.presnap-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--accent2);margin-bottom:8px}
.presnap-item{font-size:12px;color:var(--text);line-height:1.6;display:flex;gap:8px;margin-bottom:4px}
.presnap-item::before{content:'›';color:var(--accent2);flex-shrink:0}
.play-rows{display:flex;flex-direction:column;gap:6px}
.play-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s}
.play-row:active{background:var(--bg4)}
.play-row-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.play-row-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.play-row-reads{font-size:12px;color:var(--text2);line-height:1.5}
.read-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-right:6px}
.cov-content{padding:12px}
.cov-grid{display:grid;grid-template-columns:1fr;gap:12px}
.cov-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cov-card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.cov-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;flex-shrink:0}
.cov-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.cov-desc{font-size:11px;color:var(--text2);line-height:1.4;margin-top:2px}
.cov-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.cov-section-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1.5px;margin-bottom:6px}
.tells-list{display:flex;flex-wrap:wrap;gap:5px}
.tell-pill{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:3px;background:rgba(82,212,138,.1);color:var(--keep);border:1px solid rgba(82,212,138,.2)}
.cov-plays-section{padding:10px 12px;display:flex;flex-direction:column;gap:5px}
.cov-play{background:var(--bg3);border-radius:6px;padding:9px 11px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.cov-play:active{background:var(--bg4)}
.cov-play-name{font-size:12px;font-weight:600;color:var(--text)}
.cov-play-form{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px}
.cov-play-why{font-size:11px;color:var(--text2);margin-top:3px;font-style:italic;line-height:1.4}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;max-height:85dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 20px 30px;position:relative;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg4);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1.5px;margin-bottom:4px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--accent);margin-bottom:12px}
.modal-section{margin-bottom:14px}
.modal-section-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--text3);margin-bottom:6px}
.prog-list{display:flex;flex-direction:column;gap:6px}
.prog-item{display:flex;gap:10px;background:var(--bg3);border-radius:7px;padding:10px 12px;border:1px solid var(--border)}
.prog-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1;min-width:18px}
.prog-text{font-size:13px;color:var(--text);line-height:1.5}
.prog-sublabel{font-size:10px;color:var(--text3);font-style:italic;margin-top:2px}
.cov-note{background:var(--bg3);border-radius:7px;padding:10px 12px;font-size:13px;color:var(--text);line-height:1.6;border:1px solid var(--border)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--text3);gap:8px;text-align:center;padding:20px}
.empty-icon{font-size:36px}
.empty-text{font-size:14px}
.dsk-sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:8px;display:none}
.dsk-group-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;padding:12px 10px 5px}
.dsk-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:6px;background:none;border:none;color:var(--text2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;transition:all .12s}
.dsk-btn:hover{background:var(--bg3);color:var(--text)}
.dsk-btn.active{background:var(--bg4);color:var(--accent);border-left:3px solid var(--accent);padding-left:7px}
.dsk-btn.active2{background:var(--bg4);color:var(--accent2);border-left:3px solid var(--accent2);padding-left:7px}
.sit-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
@media(min-width:500px){.logo-sub{display:block}}
@media(min-width:600px){.plays-grid{grid-template-columns:repeat(3,1fr)}.cov-grid{grid-template-columns:1fr 1fr}}
@media(min-width:768px){
  .bottom-nav{display:none}
  .top-tabs{display:flex;gap:4px;margin-left:auto}
  .top-tab{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border:1px solid transparent;background:none;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
  .top-tab:hover{color:var(--text);background:var(--bg3)}
  .top-tab.active{background:var(--accent);color:#000;font-weight:600}
  .sit-layout,.form-layout{flex-direction:row}
  .scroll-bar,.form-scroll-header{display:none!important}
  .dsk-sidebar{display:block!important}
  .sit-plays,.form-content{padding:20px}
  .modal-overlay{align-items:center}
  .modal{border-radius:14px;max-height:80vh;padding:28px}
  .modal-handle{display:none}
}
@media(min-width:900px){.plays-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1000px){.cov-grid{grid-template-columns:repeat(3,1fr)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── BROWSE TAB ── */
.browse-layout{height:100%;display:flex;flex-direction:column}
.browse-set-bar{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;scrollbar-width:none}
.browse-set-bar::-webkit-scrollbar{display:none}
.browse-main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.set-heading{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent2);margin-bottom:4px}
.set-count{font-family:"DM Mono",monospace;font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:16px}
.form-section{margin-bottom:24px}
.form-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px 8px 0 0;cursor:pointer;transition:all .15s}
.form-section-header:active{background:var(--bg4)}
.form-section-name{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:2px;color:var(--text)}
.form-section-meta{display:flex;align-items:center;gap:8px}
.form-play-count{font-family:"DM Mono",monospace;font-size:10px;color:var(--text3)}
.form-chevron{color:var(--text3);font-size:14px;transition:transform .2s}
.form-chevron.open{transform:rotate(180deg)}
.form-plays-container{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
.browse-play-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-top:1px solid var(--border);cursor:pointer;transition:all .12s}
.browse-play-row:first-child{border-top:none}
.browse-play-row:active{background:var(--bg4)}
.browse-play-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.browse-play-badge{flex-shrink:0}
@media(min-width:768px){
  .browse-layout{flex-direction:row}
  .browse-set-bar{display:none}
  .browse-main{padding:24px}
}


/* ── ADJUST TAB ── */
.adjust-layout{height:100%;display:flex;flex-direction:column}
.adjust-toggle-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.adjust-toggle{flex:1;padding:11px 8px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:12px;font-weight:500;font-family:"Inter",sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.adjust-toggle.active{color:var(--accent);border-bottom-color:var(--accent)}
.adjust-main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.adj-category-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--text3);letter-spacing:2px;margin:16px 0 8px;padding:0 2px}
.adj-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.adj-card:active{background:var(--bg4);transform:scale(.98)}
.adj-icon{font-size:24px;flex-shrink:0;line-height:1}
.adj-card-text{flex:1}
.adj-card-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.adj-card-preview{font-size:11px;color:var(--text3);line-height:1.4}
.adj-chevron{color:var(--text3);font-size:16px;flex-shrink:0}
.adj-modal-what{background:rgba(232,85,71,0.12);border:1px solid rgba(232,85,71,0.3);border-radius:8px;padding:12px 14px;margin-bottom:6px}
.adj-modal-why{background:rgba(232,197,71,0.1);border:1px solid rgba(232,197,71,0.25);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.adj-modal-section-label{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:2px;margin-bottom:6px;font-weight:600;display:block}
.adj-counter-list{display:flex;flex-direction:column;gap:8px}
.adj-counter{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s}
.adj-counter:active{background:var(--bg4)}
.adj-counter-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.adj-counter-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.adj-counter-form{font-size:10px;color:var(--text2);font-family:"DM Mono",monospace;margin-bottom:4px}
.adj-counter-why{font-size:12px;color:#b0b6c4;line-height:1.5}
@media(min-width:768px){
  .adjust-layout{flex-direction:row}
  .adjust-toggle-bar{display:none}
  #adjCatBar{display:none}
  .adjust-main{padding:24px}
}

</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-inner">
    <div>
      <div class="logo">DELTA</div>
      <div class="logo-sub">DELTA OFFENSE // CFB26</div>
    </div>
    <div class="top-tabs">
      <button class="top-tab active" onclick="switchTab('situation',this)">📋 By Situation</button>
      <button class="top-tab" onclick="switchTab('formation',this)">🏈 By Formation</button>
      <button class="top-tab" onclick="switchTab('coverage',this)">🛡️ Coverage Beaters</button>
      <button class="top-tab" onclick="switchTab('browse',this)">🔍 Browse Plays</button>
      <button class="top-tab" onclick="switchTab('adjust',this)">🎯 Adjustments</button>
    </div>
  </div>
</div>

<div class="content">
  <!-- SITUATION TAB -->
  <div id="tab-situation" class="tab-panel active">
    <div class="sit-layout">
      <div class="scroll-bar" id="sitGroupBar"><div class="scroll-inner" id="sitGroupInner"></div></div>
      <div class="scroll-bar" id="sitChipBar"><div class="scroll-inner" id="sitChipInner"></div></div>
      <div class="dsk-sidebar" id="sitSidebar"></div>
      <div class="sit-plays" id="sitPlays">
        <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Select a situation to see your plays</div></div>
      </div>
    </div>
  </div>

  <!-- FORMATION TAB -->
  <div id="tab-formation" class="tab-panel">
    <div class="form-layout">
      <div class="scroll-bar form-scroll-header" id="formChipBar"><div class="scroll-inner" id="formChipInner"></div></div>
      <div class="dsk-sidebar" id="formSidebar"></div>
      <div class="form-content" id="formContent">
        <div class="empty-state"><div class="empty-icon">🏈</div><div class="empty-text">Select a formation to see pre-snap reads and play breakdowns</div></div>
      </div>
    </div>
  </div>

  <!-- COVERAGE TAB -->
  <div id="tab-coverage" class="tab-panel">
    <div class="cov-content"><div class="cov-grid" id="covGrid"></div></div>
  </div>
</div>

  <!-- BROWSE TAB -->
  <div id="tab-browse" class="tab-panel">
    <div class="browse-layout">
      <!-- Mobile: set chip bar -->
      <div class="scroll-bar browse-set-bar" id="browseSetBar">
        <div class="scroll-inner" id="browseSetInner"></div>
      </div>
      <!-- Desktop: sidebar -->
      <div class="dsk-sidebar" id="browseSidebar"></div>
      <!-- Main content -->
      <div class="browse-main" id="browseMain">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-text">Select a set to browse formations and plays</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADJUST TAB -->
  <div id="tab-adjust" class="tab-panel">
    <div class="adjust-layout">
      <!-- Mobile: section toggle -->
      <div class="adjust-toggle-bar">
        <button class="adjust-toggle active" id="adjToggleStop" onclick="switchAdjSection('stop',this)">🚫 They're Stopping My...</button>
        <button class="adjust-toggle" id="adjToggleSee" onclick="switchAdjSection('see',this)">👁 I'm Seeing...</button>
      </div>
      <!-- Mobile: category chips -->
      <div class="scroll-bar" id="adjCatBar"><div class="scroll-inner" id="adjCatInner"></div></div>
      <!-- Desktop: sidebar -->
      <div class="dsk-sidebar" id="adjSidebar"></div>
      <!-- Content -->
      <div class="adjust-main" id="adjustMain">
        <div class="empty-state">
          <div class="empty-icon">🎯</div>
          <div class="empty-text">Select what the CPU is doing to see your counters</div>
        </div>
      </div>
    </div>
  </div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-situation" onclick="switchTab('situation',this)"><span class="nav-icon">📋</span>Situation</button>
  <button class="nav-btn" id="nav-formation" onclick="switchTab('formation',this)"><span class="nav-icon">🏈</span>Formation</button>
  <button class="nav-btn" id="nav-coverage" onclick="switchTab('coverage',this)"><span class="nav-icon">🛡️</span>Coverage</button>
  <button class="nav-btn" id="nav-browse" onclick="switchTab('browse',this)"><span class="nav-icon">🔍</span>Browse</button>
  <button class="nav-btn" id="nav-adjust" onclick="switchTab('adjust',this)"><span class="nav-icon">🎯</span>Adjust</button>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// MASTER PLAY DATABASE — keyed by play name
// Each entry: { primary, secondary, covBest, covWorst, covAdjust }
// For PASS/RPO/PA: primary = "Watch the [DEFENDER] — if [CONDITION], throw to [RECEIVER] on [ROUTE]"
// For RUN: primary = "Watch the [BLOCK KEY] — [READ DESCRIPTION]"

const PLAY_DB = {
// ── RUN PLAYS ──
"Inside Zone": {

// ── MODAL — uses PLAY_DB lookup for all plays ──
function getPlayData(play) {
  return PLAY_DB[play] || {
    primary: "Read the defense pre-snap and identify the open receiver based on coverage.",
    secondary: "Check down to the HB in the flat if the primary read is covered.",
    covBest: "See Coverage Beaters tab for specific matchup notes.",
    covWorst: "See Coverage Beaters tab for what to avoid.",
    covAdjust: "Check down to the safest outlet and live to fight on the next play."
  };
}

function openModal(set, formation, play, type) {
  // Try formation-specific data first, then fall back to PLAY_DB
  const fd = FORMATIONS.find(f => f.set === set && f.name === formation);
  const fpd = fd ? fd.plays.find(p => p.play === play) : null;
  // Only use formation-level data if it has actual read fields; otherwise use PLAY_DB
  const pd = (fpd && fpd.primary) ? fpd : getPlayData(play);

  const isRun = type === 'RUN';
  const typeColor = type === 'PASS' ? 'var(--pass)' : type === 'RPO' ? 'var(--rpo)' : type === 'PA' ? 'var(--pa)' : 'var(--run)';

  // Build progression label
  const p1Label = isRun ? 'BLOCK KEY / RUN READ' : 'DEFENDER TO WATCH + ROUTE';
  const p2Label = isRun ? 'CUTBACK / SECONDARY READ' : 'SECONDARY READ';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-tag">${set.toUpperCase()} · ${formation.toUpperCase()}</div>
    <div class="modal-title">${play}</div>
    <span class="type-badge badge-${type}" style="margin-bottom:14px;display:inline-block">${type}</span>

      <div class="modal-section-label">PROGRESSION</div>

          <div>
            <div class="prog-sublabel" style="margin-bottom:4px;color:${typeColor}">${p1Label}</div>
            <div class="prog-text">${pd.primary}</div>
          </div>
        </div>
        <div class="prog-item">
          <div class="prog-num">2</div>
          <div>
            <div class="prog-sublabel" style="margin-bottom:4px">${p2Label}</div>
            <div class="prog-text">${pd.secondary}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">COVERAGE MATCHUP</div>
      <div class="prog-list">
        <div class="prog-item" style="border-left:3px solid var(--keep)">
          <div style="min-width:22px;font-size:18px;line-height:1.2">✓</div>
          <div>
            <div class="prog-sublabel" style="margin-bottom:3px;color:var(--keep)">BEST COVERAGE TO SEE</div>
            <div class="prog-text">${pd.covBest}</div>
          </div>
        </div>

          <div style="min-width:22px;font-size:18px;line-height:1.2">✗</div>
          <div>
            <div class="prog-sublabel" style="margin-bottom:3px;color:var(--red)">WORST COVERAGE — GET OUT</div>
            <div class="prog-text">${pd.covWorst}</div>
          </div>
        </div>
        <div class="prog-item" style="border-left:3px solid var(--accent)">
          <div style="min-width:22px;font-size:18px;line-height:1.2">→</div>
          <div>
            <div class="prog-sublabel" style="margin-bottom:3px;color:var(--accent)">PRIMARY COVERED + WRONG COVERAGE</div>
            <div class="prog-text">${pd.covAdjust}</div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

let activeAdjSection = 'stop';

function initAdjust(){
  renderAdjSidebar();
  renderAdjMobileChips();
}

function renderAdjSidebar(){
  const sb = document.getElementById('adjSidebar');
  sb.innerHTML = '';
  
  // Section toggle at top of sidebar
  const toggleWrap = document.createElement('div');
  toggleWrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;padding:8px;border-bottom:1px solid var(--border);margin-bottom:4px';
  ['stop','see'].forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'dsk-btn' + (sec===activeAdjSection?' active':'');
    btn.style.cssText = sec===activeAdjSection ? 'background:var(--bg4);color:var(--accent);border-left:3px solid var(--accent);padding-left:7px' : '';
    btn.textContent = sec==='stop' ? "🚫 They're Stopping My..." : "👁 I'm Seeing...";
    btn.id = 'adj-dsk-sec-'+sec;
    btn.onclick = () => {
      activeAdjSection = sec;
      document.querySelectorAll('[id^="adj-dsk-sec-"]').forEach(b => {
        b.classList.remove('active');
        b.style.cssText = '';
      });
      btn.classList.add('active');
      btn.style.cssText = 'background:var(--bg4);color:var(--accent);border-left:3px solid var(--accent);padding-left:7px';
      renderAdjSidebar();
      renderAdjMobileChips();
      document.getElementById('adjustMain').innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-text">Select a scenario to see your counters</div></div>';
    };
    toggleWrap.appendChild(btn);
  });
  sb.appendChild(toggleWrap);

  const items = activeAdjSection === 'stop' ? ADJUSTMENTS.stops : ADJUSTMENTS.seeing;
  const cats = [...new Set(items.map(i => i.category))];
  cats.forEach(cat => {
    const lbl = document.createElement('div');
    lbl.className = 'dsk-group-label';
    lbl.textContent = cat;
    sb.appendChild(lbl);
    items.filter(i => i.category === cat).forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'dsk-btn';
      btn.id = 'adj-dsk-'+item.id;
      btn.innerHTML = `<span style="margin-right:6px">${item.icon}</span>${item.label}`;
      btn.onclick = () => selectAdjItem(item.id);
      sb.appendChild(btn);
    });
  });
}

function renderAdjMobileChips(){
  const inner = document.getElementById('adjCatInner');
  inner.innerHTML = '';
  const items = activeAdjSection === 'stop' ? ADJUSTMENTS.stops : ADJUSTMENTS.seeing;
  items.forEach(item => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.id = 'adj-mob-'+item.id;
    chip.textContent = item.icon + ' ' + item.label;
    chip.onclick = () => selectAdjItem(item.id);

function switchAdjSection(sec, el){
  activeAdjSection = sec;

function selectAdjItem(id){
  const allItems = [...ADJUSTMENTS.stops, ...ADJUSTMENTS.seeing];
  const item = allItems.find(i => i.id === id);
  if(!item) return;

  // Highlight chips + sidebar
  document.querySelectorAll('#adjCatInner .chip').forEach(c => {
    const isActive = c.id === 'adj-mob-'+id;
    c.classList.toggle('active', isActive);
    c.style.backgroundColor = isActive ? 'var(--accent)' : '';
    c.style.color = isActive ? '#000' : '';
  });
  document.querySelectorAll('[id^="adj-dsk-"]').forEach(b => {
    if(!b.id.includes('sec')) b.classList.toggle('active', b.id==='adj-dsk-'+id);
  });

  const main = document.getElementById('adjustMain');
  main.innerHTML = `
    <div style="margin-bottom:6px">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1.5px;margin-bottom:4px">${item.category}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent)">${item.icon} ${item.label}</div>
    </div>

    <div class="adj-modal-what" style="margin-bottom:8px">
      <div class="adj-modal-section-label" style="color:var(--red)">WHAT THE CPU IS DOING</div>
      <div style="font-size:12px;color:#e8eaf0;line-height:1.6">${item.whatCPUDoing}</div>
    </div>

    <div class="adj-modal-why" style="margin-bottom:14px">
      <div class="adj-modal-section-label" style="color:var(--accent)">WHY IT'S WORKING</div>
      <div style="font-size:12px;color:#e8eaf0;line-height:1.6">${item.whyWorking}</div>
    </div>

    <div class="adj-modal-section-label" style="color:var(--pass);margin-bottom:8px">YOUR COUNTERS — TAP TO SEE READS</div>
    <div class="adj-counter-list">
      ${item.counters.map((c,i) => `
        <div class="adj-counter" onclick="openModal('${c.set}','${c.f}','${c.play}','${c.type}')">
          <div class="adj-counter-top">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);min-width:22px;line-height:1">${i+1}</div>
            <div class="adj-counter-name">${c.play}</div>
            <span class="type-badge badge-${c.type}">${c.type}</span>
          </div>
          <div class="adj-counter-form">${c.set.toUpperCase()} · ${c.f.toUpperCase()}</div>
          <div class="adj-counter-why">${c.why}</div>
        </div>
      `).join('')}
    </div>
  `;
  main.scrollTop = 0;
}

function closeModal(){document.getElementById("modalOverlay").classList.remove("open");document.body.style.overflow="";}
function handleOverlayClick(e){if(e.target===document.getElementById("modalOverlay"))closeModal();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

// ── INIT ──
initSituations();initFormations();initCoverages();initBrowse();initAdjust();
</script>
</body>
</html>
